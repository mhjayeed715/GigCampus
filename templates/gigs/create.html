{% extends "layout.html" %}
{% block title %}Post a Gig — GigCampus{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="mb-4"><i class="bi bi-plus-circle text-warning"></i> Post a New Gig</h2>

        <div class="card shadow">
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="title" class="form-label">Gig Title</label>
                            <input type="text" class="form-control" id="title" name="title"
                                   placeholder="e.g. I will design a professional logo for your club"
                                   maxlength="120" required>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description"
                                      rows="5" placeholder="Describe what you offer, your experience, and what the buyer gets..."
                                      required></textarea>
                        </div>

                        <div class="col-md-6">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="">Select a category...</option>
                                {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="campus_location" class="form-label">Campus Location</label>
                            <input type="text" class="form-control" id="campus_location" name="campus_location"
                                   placeholder="e.g. UB4 Lab, Library">
                        </div>

                        <div class="col-md-4">
                            <label for="price_min" class="form-label">Min Price (BDT)</label>
                            <input type="number" class="form-control" id="price_min" name="price_min"
                                   min="0" placeholder="e.g. 300" required>
                        </div>

                        <div class="col-md-4">
                            <label for="price_max" class="form-label">Max Price (BDT)</label>
                            <input type="number" class="form-control" id="price_max" name="price_max"
                                   min="0" placeholder="e.g. 2000" required>
                        </div>

                        <div class="col-md-4">
                            <label for="delivery_days" class="form-label">Delivery Days</label>
                            <input type="number" class="form-control" id="delivery_days" name="delivery_days"
                                   min="1" max="90" placeholder="e.g. 3" required>
                        </div>

                        <div class="col-12">
                            <label for="images" class="form-label">
                                <i class="bi bi-images"></i> Portfolio Images
                                <small class="text-muted">(up to 3, optional)</small>
                            </label>
                            <input type="file" class="form-control" id="images" name="images"
                                   accept=".png,.jpg,.jpeg,.gif" multiple>
                            <div class="form-text">Upload up to 3 images that showcase your work.</div>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-warning btn-lg w-100">
                                <i class="bi bi-check-circle"></i> Publish Gig
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
