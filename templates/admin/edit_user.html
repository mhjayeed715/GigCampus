{% extends "layout.html" %}
{% block title %}Edit User — Admin — GigCampus{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('admin.users') }}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h2 class="mb-0"><i class="bi bi-pencil-square text-warning me-2"></i>Edit User</h2>
        </div>

        <div class="card shadow">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   value="{{ user.username }}" required>
                        </div>

                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ user.email }}" required>
                        </div>

                        <div class="col-md-6">
                            <label for="university" class="form-label">University</label>
                            <input type="text" class="form-control" id="university" name="university"
                                   value="{{ user.university }}" required>
                        </div>

                        <div class="col-md-6">
                            <label for="department" class="form-label">Department</label>
                            <input type="text" class="form-control" id="department" name="department"
                                   value="{{ user.department }}" required>
                        </div>

                        <div class="col-md-4">
                            <label for="year_of_study" class="form-label">Year of Study</label>
                            <input type="text" class="form-control" id="year_of_study" name="year_of_study"
                                   value="{{ user.year_of_study }}" required>
                        </div>

                        <div class="col-md-4">
                            <label for="ghost_count" class="form-label">Ghost Count</label>
                            <input type="number" class="form-control" id="ghost_count" name="ghost_count"
                                   value="{{ user.ghost_count }}" min="0">
                        </div>

                        <div class="col-md-4">
                            <label for="new_password" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="new_password" name="new_password"
                                   placeholder="Leave blank to keep">
                        </div>

                        <div class="col-12">
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="is_verified"
                                           name="is_verified" {% if user.is_verified %}checked{% endif %}>
                                    <label class="form-check-label" for="is_verified">Verified</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="is_admin"
                                           name="is_admin" {% if user.is_admin %}checked{% endif %}>
                                    <label class="form-check-label" for="is_admin">Admin</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-warning btn-lg flex-grow-1">
                                <i class="bi bi-check-circle"></i> Save Changes
                            </button>
                            <a href="{{ url_for('admin.users') }}" class="btn btn-secondary btn-lg">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
